name: Publish core infra

on:
  push:
    branches:
      - main
    paths:
      - "/infra/core/**"

  workflow_dispatch:
    inputs:
      env:
        required: true
        type: choice
        description: 'Select the Environment'
        default: 'dev'
        options: 
        - dev
        - uat
        - prod
      domain:
        required: true
        type: choice
        description: 'Select the Domain'
        default: 'ar'
        options: 
        - ar
        - pnpg

jobs:
  release_dev:
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: "DEV ${{ inputs.domain }} Selfcare Infra Core Release"
    if: ${{ inputs.env == 'dev' }}
    secrets: inherit
    with:
      environment: dev-${{ inputs.domain }}
      base_path: infra/core
      env_vars: 
        ACTIONS_RUNNER_FORCED_INTERNAL_NODE_VERSION=node20
        ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION=node20
      use_private_agent: true
      override_github_environment: ${{ inputs.env }}
      use_labels: true
      override_labels: ""
