name: Code Review mongo infra

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - releases/*
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'infra/resources/**/onboarding.tf'
      - 'infra/resources/_modules/cosmosdb_collection/**'
      - 'infra/resources/_modules/cosmosdb_database/**'
      - './.github/workflows/onboarding_pr_mongo_infra.yml'
      - './.github/workflows/call_code_review_infra.yml'

jobs:
  code_review_dev_ar:
    uses: ./.github/workflows/call_code_review_infra.yml
    name: '[DEV-AR] Mongo Infra Code Review'
    if: ${{ !startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: dev
      dir: infra/resources/dev-ar
      tf_environment: dev-ar

  code_review_dev_pnpg:
    uses: ./.github/workflows/call_code_review_infra.yml
    name: '[DEV-PNPG] Mongo Infra Code Review'
    if: ${{ !startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: dev
      dir: infra/resources/dev-pnpg
      tf_environment: dev-pnpg
