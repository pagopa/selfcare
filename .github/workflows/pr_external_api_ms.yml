name: Code Review - External API MS
on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - releases/**
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "apps/external-api/**"
      - ".github/workflows/pr_external_api_ms.yml"
      - ".github/workflows/call_code_review.yml"

jobs:
  code_review:
    uses: ./.github/workflows/call_code_review.yml
    name: "Code Review"
    permissions:
      contents: read
      pull-requests: write
      packages: read
    secrets: inherit
    if: github.base_ref == 'main' && github.event_name == 'pull_request'
    with:
      pr_number: ${{ github.event.pull_request.number }}
      source_branch: ${{ github.head_ref }}
      target_branch: ${{ github.base_ref }}
      sonar_key: "pagopa_selfcare"
      module: "external-api"
