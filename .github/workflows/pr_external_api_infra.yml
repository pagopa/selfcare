name: Code Review - External API Infra

permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - releases/*
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'infra/resources/external-api/**'
      - 'infra/resources/api/dev-ar/**'
      - 'infra/resources/api/uat-ar/**'
      - 'infra/resources/api/prod-ar/**'
      - '.github/workflows/pr_external_api_infra.yml'
      - '.github/workflows/call_code_review_infra.yml'

jobs:
  code_review_dev_ar:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[DEV-AR] External API Infra Code Review'
    if: ${{ !startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: dev-ar
      base_path: infra/resources/external-api
      override_github_environment: dev
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: dev

  code_review_dev_ar_api:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[DEV-AR] API Infra Code Review'
    if: ${{ !startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: api-dev-ar
      base_path: infra/resources/api
      override_github_environment: dev
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: dev

  code_review_uat_ar:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[UAT-AR] External API Infra Code Review'
    if: ${{ startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: uat-ar
      base_path: infra/resources/external-api
      override_github_environment: uat
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: uat

  code_review_uat_ar_api:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[UAT-AR] API Infra Code Review'
    if: ${{ startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: api-uat-ar
      base_path: infra/resources/api
      override_github_environment: uat
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: uat

  code_review_prod_ar:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[PROD-AR] External API Infra Code Review'
    if: ${{ startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: prod-ar
      base_path: infra/resources/external-api
      override_github_environment: prod
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: prod

  code_review_prod_ar_api:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[PROD-AR] API Infra Code Review'
    if: ${{ startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: api-prod-ar
      base_path: infra/resources/api
      override_github_environment: prod
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: prod
