on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      environment_short:
        type: string
        required: true
      agent:
        type: string
        required: true

env:
  STORAGE_ACCOUNT_NAME: "sc${{ inputs.environment_short }}weuardocumentsst01"
  STORAGE_CONTAINER: "sc-${{ inputs.environment_short }}-documents-blob"
  STORAGE_ACCOUNT_RG: "selc-${{ inputs.environment_short }}-documents-storage-rg"
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  publish:
    name: Publish contracts template ${{ inputs.environment }}
    runs-on: [ "${{ inputs.agent }}", "${{ inputs.environment }}" ]
    environment: ${{ inputs.environment }}-ci
    permissions:
      id-token: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@1f9a0c22da41e6ebfa534300ef656657ea2c6707
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Upload to blob storage
        id: storage_upload
        run: |
          echo "Inizio upload..."
          az storage blob upload-batch \
            --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
            --auth-mode login \
            --source './infra/core/contracts_template/contracts/' \
            --destination "${{ env.STORAGE_CONTAINER }}/contracts" \
            --overwrite|| { echo "Error uploading aggregates."; exit 1; }
          echo "Upload success."

      - name: Azure Logout
        id: az_logout
        if: always()
        run: |
          az logout
