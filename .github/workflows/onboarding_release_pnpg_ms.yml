name: Deploy PNPG onboarding ms

on:
  push:
    branches:
      - main
      - releases/*
    paths:
      - "apps/onboarding-ms/**"
      - "infra/apps/onboarding-ms/**"
      - "apps/pom.xml"
      - "pom.xml"

  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: Environment
        options:
          - dev
          - uat
          - prod

jobs:
  release_dev:
    uses: ./.github/workflows/call_release_docker.yml
    name: "[Dev] Onboarding ms Release"
    if: ${{ (startsWith(github.ref_name, 'releases/') != true && inputs.env == null) || inputs.env == 'dev' }}
    secrets: inherit
    with:
      environment: dev
      tf_environment: dev-pnpg
      dir: 'infra/apps/onboarding-ms'
      dockerfile_path: './apps/onboarding-ms/Dockerfile'
      docker_image_name: 'pagopa/selfcare-onboarding-ms'
      upload_openapi_enabled: false

  release_uat:
    uses: ./.github/workflows/call_release_docker.yml
    name: "[UAT] Onboarding ms Release"
    if: ${{ (startsWith(github.ref_name, 'releases/') == true && inputs.env == null) || inputs.env == 'uat' }}
    secrets: inherit
    with:
      environment: uat
      tf_environment: uat-pnpg
      dir: 'infra/apps/onboarding-ms'
      dockerfile_path: './apps/onboarding-ms/Dockerfile'
      docker_image_name: 'pagopa/selfcare-onboarding-ms'
      upload_openapi_enabled: false

  release_prod:
    uses: ./.github/workflows/call_release_docker.yml
    name: "[Prod] Onboarding ms Release"
    if: ${{ inputs.env == 'prod' }}
    secrets: inherit
    with:
      environment: prod
      tf_environment: prod-pnpg
      dir: 'infra/apps/onboarding-ms'
      dockerfile_path: './apps/onboarding-ms/Dockerfile'
      docker_image_name: 'pagopa/selfcare-onboarding-ms'
      upload_openapi_enabled: false
