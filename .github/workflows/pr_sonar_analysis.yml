name: SonarCloud Analysis

permissions:
  contents: read
  packages: read
  pull-requests: write

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - releases/**
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'test-coverage/**'
      - 'pom.xml'
      - '.github/workflows/pr_sonar_analysis.yml'
      - '.github/workflows/call_code_review.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud Monorepo Analysis
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Set missing library
        run: |
          wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@fa2c7e4517ed008b1f73e7e0195a9eecf5582cd4
        with:
          checkout-fetch-depth: 0
          java-version: 17
          java-distribution: 'temurin'
          maven-version: '3.9.5'
          cache-enabled: true

      - uses: s4u/maven-settings-action@60912582505985be4cc55d2b890eb32767f8de5f # pin@v2.8.0
        with:
          servers: '[{"id": "selfcare", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}"}]'

      - name: Build all modules with coverage
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -T 1C -B -ntp clean test -Dquarkus.http.test-port=0 -Dquarkus.management.test-port=0

      - name: Analyze with SonarCloud
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Collect all jacoco.xml files from modules
          JACOCO_PATHS=$(find . -path '*/target/site/jacoco*/jacoco.xml' -not -path '*/test-coverage/*' | tr '\n' ',' | sed 's/,$//')
          
          SONAR_ARGS=(
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=pagopa
            -Dsonar.projectKey=pagopa_selfcare
            -Dsonar.token="$SONAR_TOKEN"
          )

          if [[ ! -z "$JACOCO_PATHS" ]]; then
            SONAR_ARGS+=(-Dsonar.coverage.jacoco.xmlReportPaths="$JACOCO_PATHS")
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SONAR_ARGS+=(
              -Dsonar.pullrequest.key="${{ github.event.pull_request.number }}"
              -Dsonar.pullrequest.branch="${{ github.head_ref }}"
              -Dsonar.pullrequest.base="${{ github.base_ref }}"
            )
          fi

          mvn -T 1C -B -ntp sonar:sonar --projects :root --also-make "${SONAR_ARGS[@]}"
