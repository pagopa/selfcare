name: Release - APIM

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - 'infra/resources/api/**'

  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: Environment
        options:
          - dev
          - uat
          - prod

