name: Code Review - Registry Proxy Infra

permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
      - releases/*
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'infra/resources/registry-proxy/**'
      - '.github/workflows/pr_registry_proxy_infra.yml'
      - '.github/workflows/call_code_review_infra.yml'

jobs:
  code_review_dev_ar:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: '[DEV-AR] Registry Proxy Infra Code Review'
    with:
      environment: dev-ar
      base_path: infra/resources/registry-proxy
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
      use_private_agent: true
      use_labels: true
      override_labels: dev

  code_review_uat_ar:
    uses: ./.github/workflows/call_code_review_infra.yml
    name: '[UAT-AR] Registry Proxy Infra Code Review'
    if: ${{ startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: uat
      dir: ./infra/resources/registry-proxy/uat-ar
      tf_environment: uat-ar
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})

  code_review_prod_ar:
    uses: ./.github/workflows/call_code_review_infra.yml
    name: '[PROD-AR] Registry Proxy Infra Code Review'
    if: ${{ startsWith(github.ref_name, 'releases/') }}
    secrets: inherit
    with:
      environment: prod
      dir: ./infra/resources/registry-proxy/prod-ar
      tf_environment: prod-ar
      env_vars: |
        TF_VAR_image_tag=sha-$(git rev-parse --short ${{ github.sha }})
