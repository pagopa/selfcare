name: User CDC - Trigger Release

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: Environment
        options:
          - dev
          - uat
          - prod
        required: true
      branch:
        type: string
        description: Branch name (e.g. releases/user-cdc_1.0.0)
        required: true

jobs:
  release:
    name: "Trigger Release Workflows"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      version: ${{ env.VERSION }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Extract Version
        run: |
          echo "VERSION=$(echo "${{ inputs.branch }}" | sed 's/.*_//;s/^v//')" >> $GITHUB_ENV

      - name: Trigger User CDC Release (AR)
        run: |
          gh workflow run release_app.yml \
            --ref ${{ inputs.branch }} \
            -f env=${{ inputs.env }} \
            -f target=ar \
            -f app=user-cdc

      - name: Trigger User CDC Release (PNPG)
        run: |
          gh workflow run release_app.yml \
            --ref ${{ inputs.branch }} \
            -f env=${{ inputs.env }} \
            -f target=pnpg \
            -f app=user-cdc

  update_uat_variable:
    name: "Update UAT Version Variable"
    needs: release
    if: ${{ inputs.env == 'uat' }}
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/call_update_gh_variable.yml
    with:
      domain: user-cdc
      env: uat
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  update_prod_variable:
    name: "Update PROD Version Variable"
    needs: release
    if: ${{ inputs.env == 'prod' }}
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/call_update_gh_variable.yml
    with:
      domain: user-cdc
      env: prod
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
