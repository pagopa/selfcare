name: Generate TLS Certificate

on:
  schedule:
    - cron: "0 2 * * 1,3"
  workflow_dispatch:
    inputs:
      api_prefix:
        type: choice
        description: API Prefix
        options:
          - "-"
          - "api"
          - "api-pnpg"
        required: true
      environment:
        type: choice
        description: Environment
        options:
          - dev
          - uat
          # - prod
        required: true
      target:
        type: choice
        description: Target type
        options:
          - areariservata
          - selfcare
        required: true
        default: areariservata
      force_renewal:
        description: "Force the certificate renewal to use when cron-triggered execution fails"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      prefix: ${{ steps.prefix.outputs.value }}
      domain: ${{ steps.domain.outputs.value }}
      api_prefix: ${{ steps.api_prefix.outputs.value }}
    steps:
      - name: Set env prefix
        id: prefix
        run: echo "value=${ENV:0:1}" >> "$GITHUB_OUTPUT"
        env:
          ENV: ${{ inputs.environment }}

      - name: Set domain prefix
        id: domain
        run: |
          if [[ "$ENV" == "prod" ]]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=${ENV}." >> "$GITHUB_OUTPUT"
          fi
        env:
          ENV: ${{ inputs.environment }}
      
      - name: Set api prefix
        id: api_prefix
        run: |
          if [[ "$ENV" == "-" ]]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.api_prefix }}." >> "$GITHUB_OUTPUT"
          fi
        env:
          ENV: ${{ inputs.environment }}

  renew-certificate:
    needs: setup
    uses: pagopa/dx/.github/workflows/release-certificate-v1.yaml@main
    secrets: inherit
    with:
      force_renewal: ${{ inputs.force_renewal || false }}
      key_vault_name: "selc-${{ needs.setup.outputs.prefix }}-kv"
      csr_common_name: "${{ needs.setup.outputs.domain }}${{ inputs.target }}.pagopa.it"
      dns_zone: "${{ needs.setup.outputs.domain }}${{ inputs.target }}.pagopa.it"
      dns_zone_resource_group: "selc-${{ needs.setup.outputs.prefix }}-vnet-rg"
      environment: ${{ inputs.environment }}

      # arm_client_id: ${{ secrets.ARM_CLIENT_ID }}
      # arm_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      # arm_tenant_id: ${{ secrets.ARM_TENANT_ID }}
      # lets_encrypt_private_key_json: ${{ secrets.LETS_ENCRYPT_PRIVATE_KEY_JSON }}
      # lets_encrypt_registration_json: ${{ secrets.LETS_ENCRYPT_REGISTRATION_JSON }}
