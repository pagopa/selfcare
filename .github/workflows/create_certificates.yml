name: Generate TLS Certificate

on:
  schedule:
    - cron: "0 2 * * 1,3"
  workflow_dispatch:
    inputs:
      api_prefix:
        type: choice
        description: Hostname prefix
        options:
          - "-"
          - "api"
          - "api-pnpg"
          - "pnpg"
        required: true
      environment:
        type: choice
        description: Environment
        options:
          - dev
          - uat
          - prod
        required: true
        default: dev
      target:
        type: choice
        description: Base domain
        options:
          - areariservata
          - selfcare
        required: true
        default: areariservata
      force_renewal:
        description: "Force the certificate renewal to use when cron-triggered execution fails"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write

jobs:
  validate-dispatch-inputs:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate pnpg hostname
        run: |
          if [[ "${{ inputs.api_prefix }}" == "pnpg" && "${{ inputs.target }}" != "selfcare" ]]; then
            echo "The pnpg hostname prefix is supported only with the selfcare base domain." >&2
            exit 1
          fi

  renew-certificate-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: validate-dispatch-inputs
    uses: pagopa/dx/.github/workflows/release-certificate-v1.yaml@main
    secrets: inherit
    with:
      force_renewal: ${{ inputs.force_renewal }}
      key_vault_name: "selc-${{ inputs.environment == 'prod' && 'p' || inputs.environment == 'uat' && 'u' || 'd' }}-kv"
      csr_common_name: "${{ inputs.api_prefix != '-' && format('{0}.', inputs.api_prefix) || '' }}${{ inputs.environment != 'prod' && format('{0}.', inputs.environment) || '' }}${{ inputs.target }}.pagopa.it"
      dns_zone: "${{ inputs.api_prefix != '-' && format('{0}.', inputs.api_prefix) || '' }}${{ inputs.environment != 'prod' && format('{0}.', inputs.environment) || '' }}${{ inputs.target }}.pagopa.it"
      dns_zone_resource_group: "selc-${{ inputs.environment == 'prod' && 'p' || inputs.environment == 'uat' && 'u' || 'd' }}-vnet-rg"
      environment: ${{ inputs.environment }}

  renew-certificate-schedule:
    if: ${{ github.event_name == 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            api_prefix: "-"
            target: areariservata
          - environment: dev
            api_prefix: api
            target: areariservata
          - environment: dev
            api_prefix: "-"
            target: selfcare
          - environment: dev
            api_prefix: api
            target: selfcare
          - environment: dev
            api_prefix: api-pnpg
            target: selfcare
          - environment: dev
            api_prefix: pnpg
            target: selfcare
          - environment: uat
            api_prefix: "-"
            target: areariservata
          - environment: uat
            api_prefix: api
            target: areariservata
          - environment: uat
            api_prefix: "-"
            target: selfcare
          - environment: uat
            api_prefix: api
            target: selfcare
          - environment: uat
            api_prefix: api-pnpg
            target: selfcare
          - environment: uat
            api_prefix: pnpg
            target: selfcare
          - environment: prod
            api_prefix: "-"
            target: areariservata
          - environment: prod
            api_prefix: api
            target: areariservata
          - environment: prod
            api_prefix: "-"
            target: selfcare
          - environment: prod
            api_prefix: api
            target: selfcare
          - environment: prod
            api_prefix: api-pnpg
            target: selfcare
          - environment: prod
            api_prefix: pnpg
            target: selfcare
    uses: pagopa/dx/.github/workflows/release-certificate-v1.yaml@main
    secrets: inherit
    with:
      force_renewal: false
      key_vault_name: "selc-${{ matrix.environment == 'prod' && 'p' || matrix.environment == 'uat' && 'u' || 'd' }}-kv"
      csr_common_name: "${{ matrix.api_prefix != '-' && format('{0}.', matrix.api_prefix) || '' }}${{ matrix.environment != 'prod' && format('{0}.', matrix.environment) || '' }}${{ matrix.target }}.pagopa.it"
      dns_zone: "${{ matrix.api_prefix != '-' && format('{0}.', matrix.api_prefix) || '' }}${{ matrix.environment != 'prod' && format('{0}.', matrix.environment) || '' }}${{ matrix.target }}.pagopa.it"
      dns_zone_resource_group: "selc-${{ matrix.environment == 'prod' && 'p' || matrix.environment == 'uat' && 'u' || 'd' }}-vnet-rg"
      environment: ${{ matrix.environment }}
