name: Institution SendMailScheduler - Trigger Release

permissions:
  contents: read
  pull-requests: write
  packages: read

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: Environment
        options: [dev, uat, prod]
        required: true
      branch:
        type: string
        description: Branch name (e.g. releases/institution-send-mail-scheduler_1.0.0)
        required: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.extract.outputs.VERSION }}
    steps:
      - id: extract
        run: |
          VERSION=$(echo "${{ inputs.branch }}" | sed 's/.*_//;s/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  release_institution_send_mail_scheduler:
    needs: prepare
    uses: ./.github/workflows/call_release_app.yml
    with:
      env: ${{ inputs.env }}
      target: selc
      app: institution-send-mail-scheduler
      APP_PATH: apps/institution-send-mail-scheduler
      APPS_POM: apps/pom.xml
      POM: pom.xml
    secrets: inherit

  update_prod_variable:
    name: "Update PROD Version Variable"
    needs: [prepare, release_institution_send_mail_scheduler]
    if: inputs.env == 'prod'
    uses: ./.github/workflows/call_update_gh_variable.yml
    with:
      domain: institution-send-mail-scheduler
      env: prod
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit
