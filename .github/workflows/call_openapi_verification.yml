name: OpenAPI Verification

on:
  workflow_call:
    inputs:
      module:
        type: string
        required: true
      path_openapi_docs:
        type: string
        required: true

permissions:
  contents: write

jobs:
  openapi_conflict_update:
    runs-on: ubuntu-24.04
    name: OpenAPI Verification

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Optic
        run: npm install -g @useoptic/optic

      - name: Extract base branch
        id: extract_branch
        run: echo "branch=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}" >> "$GITHUB_OUTPUT"

      - name: Build OpenAPI source
        run: mvn --projects :${{ inputs.module }} --also-make package -DskipTests

      - name: Debug paths
        run: |
          echo "OpenAPI file path: ${{ inputs.path_openapi_docs }}"
          echo "Base branch: origin/${{ steps.extract_branch.outputs.branch }}"
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -R

      - name: Check OpenAPI with Optic
        run: optic diff "${{ inputs.path_openapi_docs }}" --base "origin/${{ steps.extract_branch.outputs.branch }}" --check

      - name: Verify OpenAPI file is up to date
        run: |
          if git diff --name-only HEAD | grep -Fxq "${{ inputs.path_openapi_docs }}"; then
            echo "OpenAPI documentation is outdated. Regenerate and commit ${{ inputs.path_openapi_docs }}."
            exit 1
          fi
