name: OpenAPI Verification

on:
  workflow_call:
    inputs:
      module:
        type: string
        required: true
      path_openapi_docs:
        type: string
        required: true

permissions:
  contents: write

jobs:
  openapi_conflict_update:
    runs-on: ubuntu-24.04
    name: OpenAPI Verification

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install Optic
        run: |
          node --version
          npm --version
          npm install -g @useoptic/optic@1.0.9
          optic --version

      - name: Extract base branch
        id: extract_branch
        run: echo "branch=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}" >> "$GITHUB_OUTPUT"

      - name: Build OpenAPI source
        run: mvn --projects :${{ inputs.module }} --also-make package -DskipTests

      - name: Debug OpenAPI file
        run: |
          set -x

          echo "OpenAPI file path: ${{ inputs.path_openapi_docs }}"
          echo "Base branch: origin/${{ steps.extract_branch.outputs.branch }}"

          echo "Current directory:"
          pwd

          echo "Check current OpenAPI file:"
          test -f "${{ inputs.path_openapi_docs }}"
          ls -l "${{ inputs.path_openapi_docs }}"

          echo "Check base branch exists:"
          git rev-parse "origin/${{ steps.extract_branch.outputs.branch }}"

          echo "Check OpenAPI file exists in base branch:"
          git cat-file -e "origin/${{ steps.extract_branch.outputs.branch }}:${{ inputs.path_openapi_docs }}"

      - name: Validate OpenAPI JSON
        run: |
          python -m json.tool "${{ inputs.path_openapi_docs }}" > /tmp/openapi.pretty.json

      - name: Extract base OpenAPI file
        run: |
          git show "origin/${{ steps.extract_branch.outputs.branch }}:${{ inputs.path_openapi_docs }}" > /tmp/base-openapi.json
          ls -l /tmp/base-openapi.json

      - name: Check OpenAPI with Optic
        run: |
          set -x
          optic diff "${{ inputs.path_openapi_docs }}" \
            --base /tmp/base-openapi.json \
            --check

      - name: Verify OpenAPI file is up to date
        run: |
          if git diff --name-only HEAD | grep -Fxq "${{ inputs.path_openapi_docs }}"; then
            echo "OpenAPI documentation is outdated. Regenerate and commit ${{ inputs.path_openapi_docs }}."
            exit 1
          fi
