name: Trigger Release Onboarding

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: Environment
        options:
          - dev
          - uat
          - prod
      branch:
        type: string
        description: Branch name
        required: true

jobs:
  release:
    name: "Trigger Release Workflows"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@1fb4a623cfbc661771f7005e00e2cf74acf32037 # v4.2.2
        name: Checkout
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Trigger Functions Infra Release
        run: |
          gh workflow run onboarding_release_functions_infra.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger Mongo Infra Release
        run: |
          gh workflow run onboarding_release_mongo_infra.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger PNPG Functions Infra Release
        run: |
          gh workflow run onboarding_release_functions_pnpg_infra.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger PNPG Mongo Infra Release
        run: |
          gh workflow run onboarding_release_mongo_pnpg_infra.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger Functions Release
        run: |
          gh workflow run onboarding_release_functions.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger Onboarding ms Release
        run: |
          gh workflow run onboarding_release_ms.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger Onboarding CDC Release
        run: |
          gh workflow run onboarding_release_cdc.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger PNPG Functions Release
        run: |
          gh workflow run onboarding_release_pnpg_functions.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger PNPG Onboarding ms Release
        run: |
          gh workflow run onboarding_release_pnpg_ms.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}

      - name: Trigger PNPG Onboarding CDC Release
        run: |
          gh workflow run onboarding_release_pnpg_cdc.yml \
            --ref ${{ inputs.branch }} -f env=${{ inputs.env }}
