name: Deploy Selfcare App

on:
  workflow_call:
    inputs:
      env:
        type: string
        description: Environment
        required: true
      target:
        type: string
        description: Target type
        required: true
      app:
        type: string
        description: App name
        required: true
      APP_PATH:
        type: string
        description: App Path
        required: true
      INFRA_PATH:
        type: string
        description: Infrastructure Path
        required: true
      APPS_POM:
        type: string
        description: Apps pom module path
        required: true
      POM:
        type: string
        description: Parent pom
        required: true

env:
  APP_PATH: 'apps/${{ inputs.app }}'
  INFRA_PATH: 'infra/resources'
  APPS_POM: "apps/pom.xml"
  POM: "pom.xml"

jobs:

  release_dev:
    uses: ./.github/workflows/call_release_docker.yml
    name: ${{ inputs.target == 'selc' && '[Dev]' || '[Dev-PNPG]' }} - ${{ inputs.app }} Release
    if: ${{ (startsWith(github.ref_name, 'releases/') != true && inputs.env == null) || inputs.env == 'dev' }}
    secrets: inherit
    with:
      app: ${{ inputs.app }}
      environment: dev
      tf_environment: ${{ inputs.target == 'selc' && 'dev-ar' || 'dev-pnpg' }}
      dir: ${{ inputs.target == 'selc' && 'infra/resources/dev-ar' || 'infra/resources/dev-pnpg' }}
      dockerfile_path: ./${{ inputs.APP_PATH }}/Dockerfile
      docker_image_name: ${{ endsWith(inputs.app, '-cdc') && format('pagopa/selfcare-{0}', inputs.app) || endsWith(inputs.app, '-ms')  && format('pagopa/selfcare-{0}', inputs.app) || format('pagopa/selfcare-{0}-ms', inputs.app) }}
      path_openapi_docs: ./${{ inputs.APP_PATH }}/src/main/docs/openapi.json
      upload_openapi_enabled: ${{ inputs.target == 'selc' && !endsWith(inputs.app, '-cdc') }}

  release_uat:
    uses: ./.github/workflows/call_release_docker.yml
    name: ${{ inputs.target == 'selc' && '[Uat]' || '[Uat-PNPG]' }} - ${{ inputs.app }} Release
    if: ${{ (startsWith(github.ref_name, 'releases/') == true && inputs.env == null) || inputs.env == 'uat' }}
    secrets: inherit
    with:
      app: ${{ inputs.app }}
      environment: uat
      tf_environment: ${{ inputs.target == 'selc' && 'uat-ar' || 'uat-pnpg' }}
      dir: ${{ inputs.target == 'selc' && 'infra/resources/uat-ar' || 'infra/resources/uat-pnpg' }}
      dockerfile_path: ./${{ inputs.APP_PATH }}/Dockerfile
      docker_image_name: ${{ endsWith(inputs.app, '-cdc') && format('pagopa/selfcare-{0}', inputs.app) || endsWith(inputs.app, '-ms')  && format('pagopa/selfcare-{0}', inputs.app) || format('pagopa/selfcare-{0}-ms', inputs.app) }}
      path_openapi_docs: ./${{ inputs.APP_PATH }}/src/main/docs/openapi.json
      upload_openapi_enabled: ${{ inputs.target == 'selc' && !endsWith(inputs.app, '-cdc') }}

  release_prod:
    uses: ./.github/workflows/call_release_docker.yml
    name: ${{ inputs.target == 'selc' && '[Prod]' || '[Prod-PNPG]' }} - ${{ inputs.app }} Release
    if: ${{ inputs.env == 'prod' }}
    secrets: inherit
    with:
      app: ${{ inputs.app }}
      environment: prod
      tf_environment: ${{ inputs.target == 'selc' && 'prod-ar' || 'prod-pnpg' }}
      dir: ${{ inputs.target == 'selc' && 'infra/resources/prod-ar' || 'infra/resources/prod-pnpg' }}
      dockerfile_path: ./${{ inputs.APP_PATH }}/Dockerfile
      docker_image_name: ${{ endsWith(inputs.app, '-cdc') && format('pagopa/selfcare-{0}', inputs.app) || endsWith(inputs.app, '-ms')  && format('pagopa/selfcare-{0}', inputs.app) || format('pagopa/selfcare-{0}-ms', inputs.app) }}
      path_openapi_docs: ./${{ inputs.APP_PATH }}/src/main/docs/openapi.json
      upload_openapi_enabled: ${{ inputs.target == 'selc' && !endsWith(inputs.app, '-cdc') }}
