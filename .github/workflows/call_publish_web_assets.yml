on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      environment_short:
        type: string
        required: true
      domain:
        type: string
        required: true
      agent:
        type: string
        required: true
      storage_account_name:
        required: true
        description: Storage account name
        type: string
      profile_name:
        required: true
        description: CDN profile name
        type: string
      endpoint_name:
        required: true
        description: CDN endpoint name
        type: string
      resource_group_name:
        required: true
        description: Resource group name
        type: string
      
        
env:
  STORAGE_ACCOUNT_NAME: "selc${{ inputs.environment_short }}${{ inputs.storage_account_name }}"
  STORAGE_CONTAINER: "$web"
  STORAGE_ACCOUNT_RG: "selc-${{ inputs.environment_short }}-checkout-fe-rg"
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  CDN_PROFILE: selc-${{ inputs.environment_short }}-${{ inputs.profile_name }}
  ENDPOINT_NAME: selc-${{ inputs.environment_short }}-${{ inputs.endpoint_name }}
  RESOURCE_GROUP: selc-${{ inputs.environment_short }}-${{ inputs.resource_group_name }}

jobs:
  
  publish:
    name: Publish web assets ${{ inputs.environment }}
    runs-on: ["${{ inputs.environment }}"]
    environment: ${{ inputs.environment }}-ci
    permissions:
      id-token: write
      pull-requests: write
      contents: read

    steps:

    - name: Checkout
      id: checkout
      uses: actions/checkout@1f9a0c22da41e6ebfa534300ef656657ea2c6707
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Azure Login
      id: az_login
      uses: azure/login@a65d910e8af852a8061c627c456678983e180302
      with:
        client-id: ${{ secrets.ARM_CLIENT_ID }}
        tenant-id: ${{ vars.ARM_TENANT_ID }}
        subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

    - name: Upload config.json to blob storage
      run: |
        upload_status=$(az storage blob upload \
        --account-name "${{ env.STORAGE_ACCOUNT_NAME}}" \
        --account-key "${{ secrets.STORAGE_CHECKOUT_ACCOUNT_KEY }}" \
        --container '${{ env.STORAGE_CONTAINER }}' \
        --file "./infra/core/${{ inputs.environment }}-${{ inputs.domain }}/assets/config.json" \
        --name "assets/config.json" \
        --overwrite true)

        echo "${upload_status}"
        if [[ $? -eq 0 ]]; then
          echo "Upload success."
        else
          echo "Error during contracts upload batch."
          exit 1  # Esce dallo step con codice di errore
        fi


    
    - name: Upload product_institution_types to blob storage
      run: |
        upload_status=$(az storage blob upload \
        --account-name "${{ env.STORAGE_ACCOUNT_NAME}}" \
        --account-key "${{ secrets.STORAGE_CHECKOUT_ACCOUNT_KEY }}" \
        --container '${{ env.STORAGE_CONTAINER }}' \
        --file "./infra/core/${{ inputs.environment }}-${{ inputs.domain }}/assets/product_institution_types.json" \
        --name "assets/product_institution_types.json" \
        --overwrite true)

        echo "${upload_status}"
        if [[ $? -eq 0 ]]; then
          echo "Upload success."
        else
          echo "Error during contracts upload batch."
          exit 1  # Esce dallo step con codice di errore
        fi
      
    - name: Upload login-alert-message to blob storage
      run: |
        upload_status=$(az storage blob upload \
        --account-name "${{ env.STORAGE_ACCOUNT_NAME}}" \
        --account-key "${{ secrets.STORAGE_CHECKOUT_ACCOUNT_KEY }}" \
        --container '${{ env.STORAGE_CONTAINER }}' \
        --file "./infra/core/${{ inputs.environment }}-${{ inputs.domain }}/assets/login-alert-message.json" \
        --name "assets/login-alert-message.json" \
        --overwrite true)

        echo "${upload_status}"
        if [[ $? -eq 0 ]]; then
          echo "Upload success."
        else
          echo "Error during contracts upload batch."
          exit 1  # Esce dallo step con codice di errore
        fi

    - name: Upload aggregates sample files to blob storage
      run: |
        upload_status=$(az storage blob upload-batch \
        --account-name "${{ env.STORAGE_ACCOUNT_NAME }}" \
        --account-key "${{ secrets.STORAGE_CHECKOUT_ACCOUNT_KEY }}" \
        --source "./infra/core/${{ inputs.environment }}-${{ inputs.domain }}/resources/aggregates/" \
        --destination '${{ env.STORAGE_CONTAINER }}/resources/aggregates' \
        --overwrite)

        echo "${upload_status}"
        if [[ $? -eq 0 ]]; then
          echo "Upload success."
        else
          echo "Error during logo lofo batch."
          exit 1  # Esce dallo step con codice di errore
        fi

    - name: Purge blob storage assets
      run: |
          az afd endpoint purge \
            --resource-group "${RESOURCE_GROUP}" \
            --endpoint-name "${ENDPOINT_NAME}" \
            --profile-name "${CDN_PROFILE}" \
            --content-paths "/assets/*" \
            --no-wait
                
    - name: Purge blob storage resources
      run: |
          az afd endpoint purge \
            --resource-group "${RESOURCE_GROUP}" \
            --endpoint-name "${ENDPOINT_NAME}" \
            --profile-name "${CDN_PROFILE}" \
            --content-paths "/resources/*" \
            --no-wait

    - name: Azure Logout
      id: az_logout
      if: always()
      run: |
        az logout        