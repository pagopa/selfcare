name: Core Infra Drift DX

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ./infra/core/**
      - ./.github/workflows/call_code_review_infra.yml
      - ./.github/workflows/pr_core_infra.yml

  workflow_dispatch:
    inputs:
      env:
        required: true
        type: choice
        description: 'Select the Environment'
        default: dev
        options:
          - dev
          - uat
          - prod
      domain:
        required: true
        type: choice
        description: 'Select the Domain'
        default: ar
        options:
          - ar
          - pnpg

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  id-token: write
  actions: read


jobs:
  drift_detection:
    uses: pagopa/dx/.github/workflows/infra_drift_detection.yml@main
    name: "[${{ inputs.env }}-${{ inputs.domain }}] Selfcare Infra Core Drift detection"
    secrets: inherit
    with:
      environment: ${{ inputs.env }}-${{ inputs.domain }}
      base_path: infra/core
      # env_vars: ""
      use_private_agent: true
      override_github_environment: ${{ inputs.env }}
      use_labels: true
      override_labels: ${{ inputs.env }}  