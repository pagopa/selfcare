name: Deploy Functions App

on:
  workflow_call:
    inputs:
      env:
        type: string
        description: Environment
        required: true
      target:
        type: string
        description: Target type
        required: true
      app:
        type: string
        description: Function name
        required: true

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  infra_dev:
    name: ${{ inputs.target == 'selc' && '[Dev]' || '[Dev-PNPG]' }} - Infra Apply
    if: ${{ (startsWith(github.ref_name, 'releases/') != true && inputs.env == null) || inputs.env == 'dev' }}
    uses: ./.github/workflows/call_release_infra.yml
    secrets: inherit
    with:
      environment: dev
      tf_environment: ${{ inputs.target == 'selc' && 'dev-ar' || 'dev-pnpg' }}
      dir: ${{ inputs.target == 'selc' && 'infra/resources/onboarding-functions/dev-ar' || 'infra/resources/onboarding-functions/dev-pnpg' }}
      runner: "self-hosted"

  release_dev:
    name: ${{ inputs.target == 'selc' && '[Dev]' || '[Dev-PNPG]' }} - ${{ inputs.app }} Release
    if: ${{ (startsWith(github.ref_name, 'releases/') != true && inputs.env == null) || inputs.env == 'dev' }}
    needs: [infra_dev]
    runs-on: ubuntu-24.04
    environment:
      name: dev-cd
      url: ${{ format('https://selc-{0}-onboarding-fn.azurewebsites.net', inputs.target == 'selc' && 'd' || 'd-pnpg') }}
    permissions:
      id-token: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  v4
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@fa2c7e4517ed008b1f73e7e0195a9eecf5582cd4  v1.11.0
        with:
          java-version: 17
          java-distribution: "temurin"
          maven-version: "3.9.5"
          cache-enabled: true
      - name: Build & Deploy
        shell: bash
        run: |
          mvn --projects :${{ inputs.app }} --also-make package install -DskipTests \
            -Dquarkus.azure-functions.app-name=${{ format('selc-{0}-onboarding-fn', inputs.target == 'selc' && 'd' || 'd-pnpg') }}
      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main
      - name: Wait for Function Storage RBAC propagation
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="${{ format('selc-{0}-onboarding-fn', inputs.target == 'selc' && 'd' || 'd-pnpg') }}"
          RG_NAME="${{ format('selc-{0}-onboarding-fn-rg', inputs.target == 'selc' && 'd' || 'd-pnpg') }}"

          PRINCIPAL_ID="$(az functionapp identity show --name "$APP_NAME" --resource-group "$RG_NAME" --query principalId -o tsv)"
          STORAGE_ACCOUNT_NAME="$(az functionapp config appsettings list --name "$APP_NAME" --resource-group "$RG_NAME" --query "[?name=='AzureWebJobsStorage__accountName'].value | [0]" -o tsv)"

          if [ -z "${PRINCIPAL_ID}" ] || [ "${PRINCIPAL_ID}" = "null" ]; then
            echo "Unable to resolve Function managed identity principalId for ${APP_NAME}"
            exit 1
          fi
          if [ -z "${STORAGE_ACCOUNT_NAME}" ] || [ "${STORAGE_ACCOUNT_NAME}" = "null" ]; then
            echo "Unable to resolve AzureWebJobsStorage__accountName for ${APP_NAME}"
            exit 1
          fi

          STORAGE_ACCOUNT_ID="$(az storage account show --name "$STORAGE_ACCOUNT_NAME" --resource-group "$RG_NAME" --query id -o tsv)"
          REQUIRED_ROLES=("Storage Blob Data Contributor" "Storage Queue Data Contributor" "Storage Table Data Contributor")

          for attempt in {1..20}; do
            missing=0
            for role in "${REQUIRED_ROLES[@]}"; do
              assigned="$(az role assignment list \
                --assignee-object-id "$PRINCIPAL_ID" \
                --scope "$STORAGE_ACCOUNT_ID" \
                --query "[?roleDefinitionName=='${role}'] | length(@)" -o tsv)"
              if [ "${assigned}" = "0" ]; then
                missing=1
                echo "Attempt ${attempt}/20: role not propagated yet -> ${role}"
              fi
            done

            if [ "${missing}" = "0" ]; then
              echo "All storage data-plane roles are available for ${APP_NAME}"
              break
            fi

            if [ "${attempt}" -eq 20 ]; then
              echo "RBAC propagation timeout for ${APP_NAME}"
              exit 1
            fi
            sleep 15
          done
      - name: Deploy Function App
        shell: bash
        working-directory: apps/${{ inputs.app }}
        run: |
          mvn -f pom.xml quarkus:deploy \
            -Dquarkus.azure-functions.app-name=${{ format('selc-{0}-onboarding-fn', inputs.target == 'selc' && 'd' || 'd-pnpg') }} \
            -Dquarkus.azure-functions.subscription-id=${{ secrets.ARM_SUBSCRIPTION_ID }} \
            -Dquarkus.azure-functions.resource-group=${{ format('selc-{0}-onboarding-fn-rg', inputs.target == 'selc' && 'd' || 'd-pnpg') }} \
            -Dquarkus.azure-functions.region=westeurope \
            -Dquarkus.azure-functions.app-service-plan-name=${{ format('selc-{0}-onboarding-fn-plan', inputs.target == 'selc' && 'd' || 'd-pnpg') }} \
            -Dquarkus.azure-functions.runtime.java-version=17

  infra_uat:
    name: ${{ inputs.target == 'selc' && '[Uat]' || '[Uat-PNPG]' }} - Infra Apply
    if: ${{ (startsWith(github.ref_name, 'releases/') == true && inputs.env == null) || inputs.env == 'uat' }}
    uses: ./.github/workflows/call_release_infra.yml
    secrets: inherit
    with:
      environment: uat
      tf_environment: ${{ inputs.target == 'selc' && 'uat-ar' || 'uat-pnpg' }}
      dir: ${{ inputs.target == 'selc' && 'infra/resources/onboarding-functions/uat-ar' || 'infra/resources/onboarding-functions/uat-pnpg' }}
      runner: "self-hosted"

  release_uat:
    name: ${{ inputs.target == 'selc' && '[Uat]' || '[Uat-PNPG]' }} - ${{ inputs.app }} Release
    if: ${{ (startsWith(github.ref_name, 'releases/') == true && inputs.env == null) || inputs.env == 'uat' }}
    needs: [infra_uat]
    runs-on: ubuntu-24.04
    environment:
      name: uat-cd
      url: ${{ format('https://selc-{0}-onboarding-fn.azurewebsites.net', inputs.target == 'selc' && 'u' || 'u-pnpg') }}
    permissions:
      id-token: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  v4
      - name: Setup Maven Action
        uses: s4u/setup-maven-action@fa2c7e4517ed008b1f73e7e0195a9eecf5582cd4  v1.11.0
        with:
          java-version: 17
          java-distribution: "temurin"
          maven-version: "3.9.5"
          cache-enabled: true
      - name: Build & Deploy
        shell: bash
        run: |
          mvn --projects :${{ inputs.app }} --also-make package install -DskipTests \
            -Dquarkus.azure-functions.app-name=${{ format('selc-{0}-onboarding-fn', inputs.target == 'selc' && 'u' || 'u-pnpg') }}
      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main
      - name: Wait for Function Storage RBAC propagation
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="${{ format('selc-{0}-onboarding-fn', inputs.target == 'selc' && 'u' || 'u-pnpg') }}"
          RG_NAME="${{ format('selc-{0}-onboarding-fn-rg', inputs.target == 'selc' && 'u' || 'u-pnpg') }}"

          PRINCIPAL_ID="$(az functionapp identity show --name "$APP_NAME" --resource-group "$RG_NAME" --query principalId -o tsv)"
          STORAGE_ACCOUNT_NAME="$(az functionapp config appsettings list --name "$APP_NAME" --resource-group "$RG_NAME" --query "[?name=='AzureWebJobsStorage__accountName'].value | [0]" -o tsv)"

