on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      tf_environment:
        type: string
        required: false
      dir:
        type: string
        required: true
      env_vars:
        type: string
        required: false
        description: List of environment variables to set up, given in env=value format.
      runner:
        type: string
        required: false
        default: 'ubuntu-24.04'
        description: Runner label(s) as JSON array, e.g. 'self-hosted'

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  TERRAFORM_ENVIRONMENT: ${{ inputs.tf_environment || inputs.environment }}

jobs:

  tf_plan:
    name: 'Terraform Plan'
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}-ci
    permissions:
      id-token: write
      contents: read
    outputs:
      terraform_version: ${{ steps.set-terraform-version.outputs.terraform_version }}
      plan_file: ${{ steps.set-plan-file.outputs.plan_file }}

    steps:

      - uses: actions/checkout@1fb4a623cfbc661771f7005e00e2cf74acf32037 # v4.2.2
        name: Checkout

      - name: Set Environment Variables
        if: ${{ inputs.env_vars }}
        run: |
          for i in "${{ inputs.env_vars }}"
          do
            printf "%s\n" $i >> $GITHUB_ENV
          done

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Set Terraform Version
        id: set-terraform-version
        run: |
          if [ -f ".terraform-version" ]; then
            echo "terraform_version=$(cat .terraform-version)" >> $GITHUB_OUTPUT
          elif [ -f "../.terraform-version" ]; then
            echo "terraform_version=$(cat ../.terraform-version)" >> $GITHUB_OUTPUT
          else
            echo "terraform_version=latest" >> $GITHUB_OUTPUT
          fi

      - uses: hashicorp/setup-terraform@a1502cd9e758c50496cc9ac5308c4843bcd56d36 # v3.0.0
        name: Setup Terraform
        with:
          terraform_version: ${{ steps.set-terraform-version.outputs.terraform_version }}

      - name: Terraform Init
        shell: bash
        working-directory: ${{ inputs.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "./terraform.sh" ]; then
            bash ./terraform.sh init ${{ env.TERRAFORM_ENVIRONMENT }}
          else
            terraform init
          fi

      - name: Set Plan File Name
        id: set-plan-file
        run: |
          echo "plan_file=tfplan-${{ env.TERRAFORM_ENVIRONMENT }}-sha-$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Retrieve Terraform Modules from Cache
        id: cache-terraform-modules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ inputs.dir }}/.terraform
          key: terraform-${{ inputs.dir }}-${{ steps.set-plan-file.outputs.plan_file }}
          restore-keys: |
            terraform-${{ inputs.dir }}

      - name: Terraform Plan
        shell: bash
        working-directory: ${{ inputs.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          plan_file="${{ steps.set-plan-file.outputs.plan_file }}"
          if [ -f "./terraform.sh" ]; then
            bash ./terraform.sh plan ${{ env.TERRAFORM_ENVIRONMENT }} -tfplan="$plan_file"
          else
            terraform plan -lock-timeout=3000s -out="$plan_file" -input=false
          fi

      - name: Upload Terraform Plan as Artifact
        uses: pagopa/dx/actions/terraform-plan-upload@main
        env:
          ARTIFACT_ENC_KEY: ${{ secrets.ARTIFACT_ENC_KEY }}
        with:
          plan-file: ${{ steps.set-plan-file.outputs.plan_file }}
          working-directory: ${{ inputs.dir }}
          artifact-name: terraform-plan
          retention-days: 1

  apply:
    name: 'Terraform Apply'
    runs-on: ['${{ inputs.runner }}', '${{ inputs.environment }}']
    needs: [ tf_plan ]
    environment: ${{ inputs.environment }}-cd
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:

      - uses: actions/checkout@1fb4a623cfbc661771f7005e00e2cf74acf32037 # v4.2.2
        name: Checkout

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Download Terraform Plan as Artifact
        uses: pagopa/dx/actions/terraform-plan-download@main
        env:
          ARTIFACT_ENC_KEY: ${{ secrets.ARTIFACT_ENC_KEY }}
        with:
          plan-file: ${{ needs.tf_plan.outputs.plan_file }}
          working-directory: ${{ inputs.dir }}
          artifact-name: terraform-plan

      - name: Retrieve Terraform Modules from Cache
        id: cache-terraform-modules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ inputs.dir }}/.terraform
          key: terraform-${{ inputs.dir }}-${{ needs.tf_plan.outputs.plan_file }}
          restore-keys: |
            terraform-${{ inputs.dir }}

      - uses: hashicorp/setup-terraform@a1502cd9e758c50496cc9ac5308c4843bcd56d36 # v3.0.0
        name: Setup Terraform
        with:
          terraform_version: ${{ needs.tf_plan.outputs.terraform_version }}

      - name: Terraform Init
        shell: bash
        working-directory: ${{ inputs.dir }}
        run: |
          if [ -f "./terraform.sh" ]; then
            bash ./terraform.sh init ${{ env.TERRAFORM_ENVIRONMENT }}
          else
            terraform init
          fi

      - name: Terraform Apply
        shell: bash
        working-directory: ${{ inputs.dir }}
        run: |
          terraform apply -lock-timeout=3000s -auto-approve -input=false ${{ needs.tf_plan.outputs.plan_file }}
