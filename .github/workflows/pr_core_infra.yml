jobs:
  infra_plan:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: Infra plan
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      base_path: './infra/core/${{ inputs.environment }}-${{ inputs.domain }}'
      # Optional parameters
      env_vars: ""
      use_private_agent: true
      # override_github_environment: pe-prod
      use_labels: true
      override_labels: ""