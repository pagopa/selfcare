on:
  workflow_call:
    inputs:
      env:
        type: string
        description: Environment
        required: true
      api_folder_path:
        type: string
        description: Path of API folder
        required: true
        #/api/ms_external_api/v2
      docs_openapi_path:
        type: string
        description: Path of docs storage openapi
        required: true
        #developer/external/v2/ms-external-api.json
      api_title:
        type: string
        description: Title of API to show on message
        required: true
      enable_notification:
        required: true
        type: boolean
        default: true
      is_pnpg:
        type: boolean
        required: false
        default: false
    
    secrets:
      API_NOTIFICATION_TRIGGERS_ID:
        required: true
      ARM_CLIENT_ID:
        required: true

env:
  DIR: "./infra/resources/_modules/apim_external_api"
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  
jobs:
  detect:
    name: 'Update Developer Docs And Sending Slack notification'
    runs-on: ubuntu-24.04
    environment: ${{ inputs.env }}-cd
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        id: checkout
        uses: actions/checkout@1f9a0c22da41e6ebfa534300ef656657ea2c6707

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main


      - name: Extract environment short
        id: extract_env_short
        shell: bash
        run: |
          env=${{ inputs.env }}
          echo "env_short=${env:0:1}" >> $GITHUB_OUTPUT
          
          if ${{ inputs.is_pnpg }}; then
            echo "checkout_cdn_name=selc-${env:0:1}-weu-pnpg-checkout-fde-01" >> $GITHUB_OUTPUT
            echo "checkout_cdn_profile=selc-${env:0:1}-weu-pnpg-checkout-afd-01" >> $GITHUB_OUTPUT
            echo "pnpg_suffix=-weu-pnpg" >> $GITHUB_OUTPUT
            echo "pnpg_suffix_storage=weupnpg" >> $GITHUB_OUTPUT
            echo "storage_account_name=selc${env:0:1}weupnpgcheckoutst01" >> $GITHUB_OUTPUT
          else
            echo "checkout_cdn_name=selc-${env:0:1}-weu-ar-checkout-fde-01" >> $GITHUB_OUTPUT
            echo "checkout_cdn_profile=selc-${env:0:1}-weu-ar-checkout-afd-01" >> $GITHUB_OUTPUT
            echo "pnpg_suffix=" >> $GITHUB_OUTPUT
            echo "pnpg_suffix_storage=" >> $GITHUB_OUTPUT
            echo "storage_account_name=selc${env:0:1}weuarcheckoutst01" >> $GITHUB_OUTPUT
          fi

      - name: Download Developer OpenAPI from blob storage
        uses: azure/CLI@965c8d7571d2231a54e321ddd07f7b10317f34d9 # v2
        with:
          inlineScript: |
            mkdir docs
            az storage blob download-batch --auth-mode key -d ./docs/ --account-name ${{ steps.extract_env_short.outputs.storage_account_name }}  -s '$web' --pattern ${{ inputs.docs_openapi_path }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Optic
        run: |
          mkdir -p optic-install
          cd optic-install

          npm init -y
          npm pkg set overrides.ajv="8.17.1"
          npm install @useoptic/optic@1.0.9
        shell: bash

      - name: Verify if Operation Changes
        id: optic_diff
        shell: bash
        env:
          DOCS_OPENAPI_PATH: ${{ inputs.docs_openapi_path }}
          API_BASE_DIR: ${{ env.DIR }}
          API_FOLDER_PATH: ${{ inputs.api_folder_path }}
          TARGET_ENV: ${{ inputs.env }}
        run: |
          set +e
          docs_path="./docs/$DOCS_OPENAPI_PATH"
          target_path="$API_BASE_DIR$API_FOLDER_PATH/openapi.$TARGET_ENV.json"
          optic_output=$(./optic-install/node_modules/.bin/optic diff "$docs_path" "$target_path")
          echo "$optic_output"
          echo "$optic_output" > optic_diff_output.txt
          if grep -q "Operations: No operations changed" optic_diff_output.txt; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to blob storage
        uses: azure/CLI@965c8d7571d2231a54e321ddd07f7b10317f34d9 # v2
        if: ${{ steps.optic_diff.outputs.changes_detected == 'true'}}
        with:
          inlineScript: |
            az storage blob upload --auth-mode login \
              --container '$web' \
              --account-name ${{ steps.extract_env_short.outputs.storage_account_name }} \
              --file "${{ env.DIR }}${{ inputs.api_folder_path }}/openapi.${{ inputs.env }}.json" \
              --overwrite true \
              --name '${{ inputs.docs_openapi_path }}' 

      - name: Purge blob storage assets
        uses: azure/CLI@965c8d7571d2231a54e321ddd07f7b10317f34d9 # v2
        if: ${{ steps.optic_diff.outputs.changes_detected == 'true'}}
        with:
          inlineScript: |
            az afd endpoint purge \
              --resource-group selc-${{ steps.extract_env_short.outputs.env_short }}${{ steps.extract_env_short.outputs.pnpg_suffix }}-checkout-fe-rg \
              --endpoint-name ${{ steps.extract_env_short.outputs.checkout_cdn_name }} \
              --profile-name ${{ steps.extract_env_short.outputs.checkout_cdn_profile }} \
              --content-paths "/${{ inputs.docs_openapi_path }}" \
              --no-wait

      - name: Extract changes MD
        if: ${{ inputs.enable_notification && steps.optic_diff.outputs.changes_detected == 'true' }}
        id: extract_change_md
        shell: bash
        run: |
          changed_operations=$(awk '/Operations/{flag=1; next} /Rerun this/{flag=0} flag' optic_diff_output.txt)
          echo "$changed_operations"
          echo "$changed_operations" > changed_operations.txt

      - name: Send HTTP POST notification using Slack
        if: ${{ inputs.enable_notification && steps.optic_diff.outputs.changes_detected == 'true' }}
        run: |
          body_content=$(cat changed_operations.txt)
          curl -X POST https://hooks.slack.com/triggers/${{ secrets.API_NOTIFICATION_TRIGGERS_ID }} \
          -H "Content-Type: application/json" \
          -d '{
                "body": "'"$body_content"'",
                "title": "${{ inputs.api_title }}"
              }'
