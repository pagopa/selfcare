version: "3.8"
services:
  mockserver:
    image: mockserver/mockserver@sha256:adec675a93253dcd503cda331dbc8c88383c1c79ceb2370ec9766ad3f010d255
    ports:
      - "1080:1080"
    environment:
      - MOCKSERVER_INITIALIZATION_JSON_PATH=/config/*.json
      - MOCKSERVER_ENABLE_CORS_FOR_API="true"
      - MOCKSERVER_ENABLE_CORS_FOR_ALL_RESPONSES="true"
    volumes:
      - "./integration-test-config/mock:/config"
    networks:
      - develop-network

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite@sha256:647c63a91102a9d8e8000aab803436e1fc85fbb285e7ce830a82ee5d6661cf37
    ports:
      - "10000:10000"
    command: "azurite --blobHost 0.0.0.0 --inMemoryPersistence"
    environment:
      - AZURITE_ACCOUNTS=devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCD9I1QhZT4gRjAAHEDPazjFIwtg==
    networks:
      - develop-network

  azure-cli:
    build:
      context: "."
      dockerfile: "integration-test-config/azure-cli/Dockerfile-azure-cli"
    depends_on:
      - azurite
    networks:
      - develop-network
    volumes:
      - "./integration-test-config/blobStorageInit/initAzurite.sh:/initAzurite.sh"
      - "./integration-test-config/blobStorageInit/signed_IO_accordo_adesione.pdf:/workspace/signed_IO_accordo_adesione.pdf"
      - "./integration-test-config/blobStorageInit/products.json:/workspace/products.json"
    environment:
      - SELFCARE_INFRA_PRIVATE_ENV=dev

  mongodb:
    image: mongo@sha256:1cb283500219e8fc0b61b328ea5a199a395a753d88b17351c58874fb425223cb
    ports:
      - "27017:27017"
    volumes:
      - "./integration-test-config/db:/docker-entrypoint-initdb.d"
    networks:
      - develop-network

  userms:
    image: ghcr.io/pagopa/selfcare-user-ms:latest@sha256:61e5e537010217c8cd2aacaf88e65564789461b6647296b56a6b8d301aec39d2
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8081:8080"
    env_file:
      - "./src/test/resources/userenv"
    networks:
      - develop-network
    depends_on:
      - mongodb

  onboardingms:
    image: ghcr.io/pagopa/selfcare-onboarding-ms:latest@sha256:7c38bf6df6024e97b0ba6f7200c86cb2a5d9922ce845ead6fa1cc6529b8e1f00
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8080:8080"
    env_file:
      - "./src/test/resources/onboardingenv"
    networks:
      - develop-network
    depends_on:
      - mongodb

  documentms:
    image: ghcr.io/pagopa/selfcare-document-ms:latest@sha256:993031cd354561cbb21b0a28c9bc96740b28c753072e76eeecbb0c58a0754c00
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8086:8080"
    env_file:
      - "./src/test/resources/documentenv"
    networks:
      - develop-network
    depends_on:
      - mongodb

  institutionms:
    image: ghcr.io/pagopa/selfcare-institution-ms:latest@sha256:1a67be95337e5140a4d5356bb3284281c1de5f30af2476102c7a9cb0a73ad446
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8082:8082"
    env_file:
      - "./src/test/resources/institutionenv"
    networks:
      - develop-network
    depends_on:
      - mongodb

  usergroupms:
    image: ghcr.io/pagopa/selfcare-user-group-ms:latest@sha256:de2f74a14d8bac4fa953261e2c236b303ed1b2424e11a8eb58bc1e4bc23e5e7b
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8083:8083"
    env_file:
      - "./src/test/resources/usergroupenv"
    networks:
      - develop-network
    depends_on:
      - mongodb

  iamms:
    image: ghcr.io/pagopa/selfcare-iam-ms:latest@sha256:c5a3d346953f005fc965b563d784d80a1276397367577e71f4bcd295b787e45d
    pull_policy: always
    platform: linux/amd64
    ports:
      - "8085:8080"
    env_file:
      - "./src/test/resources/iamenv"
    networks:
      - develop-network
    depends_on:
      - mongodb

networks:
  develop-network:
    name: selfcare-develop-network-dashboard-bff
