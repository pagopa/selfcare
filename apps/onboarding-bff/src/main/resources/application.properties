## HTTP Server
quarkus.banner.path=banner.txt
quarkus.http.port=${B4F_ONBOARDING_SERVER_PORT:8080}
quarkus.http.limits.max-body-size=10M
quarkus.http.auth.proactive=false

## Logging
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}
quarkus.log.category."it.pagopa.selfcare".level=${B4F_ONBOARDING_LOG_LEVEL:DEBUG}

quarkus.log.console.json.enabled=false
quarkus.log.console.json.pretty-print=false

## JWT
mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
mp.jwt.verify.issuer=${JWT_ISSUER:SPID}
smallrye.jwt.claims.sub=uid

## OpenAPI / Swagger UI
mp.openapi.extensions.smallrye.operationIdStrategy=METHOD
quarkus.smallrye-openapi.info-title=Onboarding-BFF API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description="SelfCare Onboarding BFF"
quarkus.smallrye-openapi.store-schema-directory=src/main/docs
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

## OpenAPI Generator
quarkus.openapi-generator.codegen.validateSpec=false

quarkus.openapi-generator.codegen.spec.institution_json.mutiny=true
quarkus.openapi-generator.codegen.spec.institution_json.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.institution_json.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders(it.pagopa.selfcare.onboarding.security.AuthenticationPropagationHeadersFactory.class)

quarkus.openapi-generator.codegen.spec.onboarding_json.mutiny=true
quarkus.openapi-generator.codegen.spec.onboarding_json.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.onboarding_json.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders(it.pagopa.selfcare.onboarding.security.AuthenticationPropagationHeadersFactory.class)

quarkus.openapi-generator.codegen.spec.user_registry_json.mutiny=true
quarkus.openapi-generator.user_registry_json.auth.api_key.api-key=${USER-REGISTRY-API-KEY:example-api-key}

quarkus.openapi-generator.codegen.spec.user_json.mutiny=true
quarkus.openapi-generator.codegen.spec.user_json.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.user_json.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders(it.pagopa.selfcare.onboarding.security.AuthenticationPropagationHeadersFactory.class)

quarkus.openapi-generator.codegen.spec.onboarding_functions_json.mutiny=true
quarkus.openapi-generator.onboarding_functions_json.auth.api_key.api-key=${ONBOARDING-FUNCTIONS-API-KEY:example-api-key}

quarkus.openapi-generator.codegen.spec.product_json.mutiny=true
quarkus.openapi-generator.codegen.spec.product_json.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.product_json.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders(it.pagopa.selfcare.onboarding.security.AuthenticationPropagationHeadersFactory.class)

quarkus.openapi-generator.codegen.spec.document_json.mutiny=true
quarkus.openapi-generator.codegen.spec.document_json.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.document_json.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders(it.pagopa.selfcare.onboarding.security.AuthenticationPropagationHeadersFactory.class)

## Rest Client Logging
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=50
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=INFO

