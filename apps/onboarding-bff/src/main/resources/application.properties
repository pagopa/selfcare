## Product SDK
onboarding-bff.blob-storage.container-product=${PRODUCT_STORAGE_CONTAINER:selc-d-product}
onboarding-bff.blob-storage.filepath-product=products.json
onboarding-bff.blob-storage.connection-string-product=${BLOB_STORAGE_PRODUCT_CONNECTION_STRING:UseDevelopmentStorage=true;}

## App Insights
onboarding-bff.appinsights.connection-string=${APPLICATIONINSIGHTS_CONNECTION_STRING:InstrumentationKey=00000000-0000-0000-0000-000000000000}

## Jacoco
%test.quarkus.jacoco.includes=it/pagopa/selfcare/onboarding/controller/*,it/pagopa/selfcare/onboarding/service/**
%test.quarkus.jacoco.data-file=target/jacoco.exec

