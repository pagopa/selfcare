      required:
      - name
      - surname
      - taxCode
      - role
      properties:
        name:
          type: string
          pattern: \S
        surname:
          type: string
          pattern: \S
        taxCode:
          type: string
          pattern: \S
        role:
          $ref: "#/components/schemas/PartyRole"
        email:
          type: string
        productRole:
          type: string
    UserId:
      type: object
      required:
      - id
      properties:
        id:
          $ref: "#/components/schemas/UUID"
    UserInfo:
      type: object
      required:
      - id
      - name
      - surname
      - email
      - fiscalCode
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        fiscalCode:
          type: string
    UserRequestDto:
      type: object
      required:
      - name
      - surname
      - email
      properties:
        name:
          type: string
          pattern: \S
        surname:
          type: string
          pattern: \S
        email:
          type: string
          pattern: \S
    UserRequesterResponse:
      type: object
      properties:
        userMailUuid:
          type: string
        userRequestUid:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: string
        taxCode:
          type: string
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/PartyRole2"
        productRole:
          type: string
    UserTaxCodeDto:
      type: object
      required:
      - taxCode
      properties:
        taxCode:
          type: string
          pattern: \S
    VerificationLegalAddressRequest:
      type: object
      required:
      - taxCode
      properties:
        taxCode:
          type: string
          pattern: \S
    VerificationMatchRequest:
      type: object
      required:
      - taxCode
      - userDto
      properties:
        taxCode:
          type: string
          pattern: \S
        userDto:
          $ref: "#/components/schemas/UserDto"
