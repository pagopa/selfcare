
quarkus.http.port=8080

#quarkus.smallrye-jwt.blocking-authentication=true

## JWT
mp.jwt.verify.publickey=${JWT-PUBLIC-KEY}
smallrye.jwt.claims.sub=uid
## OPEN API ##
quarkus.smallrye-openapi.info-title=Document API
quarkus.smallrye-openapi.info-version=1.0.0


quarkus.log.level=INFO

## MONGODB
quarkus.mongodb.connection-string = ${MONGODB-CONNECTION-STRING}
quarkus.mongodb.database = selcDocument


## SIGNATURE

document-ms.signature.verify-enabled=${SIGNATURE_VALIDATION_ENABLED:true}
document-ms.signature.eu-list-of-trusted-lists-url=https://ec.europa.eu/tools/lotl/eu-lotl.xml
document-ms.signature.eu-official-journal-url=https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv:OJ.C_.2019.276.01.0001.01.ENG
document-ms.pagopa-signature.source=${PAGOPA_SIGNATURE_SOURCE:disabled}
document-ms.pagopa-signature.signer=${PAGOPA_SIGNATURE_SIGNER:PagoPA S.p.A.}
document-ms.pagopa-signature.location=${PAGOPA_SIGNATURE_LOCATION:Roma}
document-ms.pagopa-signature.apply-onboarding-template-reason=${PAGOPA_SIGNATURE_ONBOARDING_REASON_TEMPLATE:Firma contratto adesione prodotto}

## Rest Client
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=50

quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=INFO

quarkus.smallrye-openapi.store-schema-directory=src/main/docs


quarkus.openapi-generator.codegen.spec.core_json.mutiny=true
quarkus.openapi-generator.codegen.spec.core_json.additional-model-type-annotations=@lombok.Builder; @lombok.NoArgsConstructor; @lombok.AllArgsConstructor
quarkus.openapi-generator.codegen.spec.core_json.enable-security-generation=false
quarkus.openapi-generator.codegen.spec.core_json.additional-api-type-annotations=@org.eclipse.microprofile.rest.client.annotation.RegisterClientHeaders(it.pagopa.selfcare.onboarding.client.auth.AuthenticationPropagationHeadersFactory.class)


mp.openapi.extensions.smallrye.operationIdStrategy=METHOD

## AZURE STORAGE ##

document-ms.blob-storage.container-product=${STORAGE_CONTAINER_PRODUCT:selc-d-product}
document-ms.blob-storage.filepath-product = products.json
document-ms.blob-storage.connection-string-product = ${BLOB-STORAGE-PRODUCT-CONNECTION-STRING:UseDevelopmentStorage=true;}

document-ms.blob-storage.path-contracts = parties/docs/
document-ms.blob-storage.path-aggregates = parties/csv/aggregates/
document-ms.blob-storage.container-contracts=${STORAGE_CONTAINER_CONTRACT:sc-d-documents-blob}
document-ms.blob-storage.connection-string-contracts = ${BLOB-STORAGE-CONTRACT-CONNECTION-STRING:UseDevelopmentStorage=true;}

## Jacoco
quarkus.jacoco.includes=it/pagopa/selfcare/onboarding/controller/*,it/pagopa/selfcare/onboarding/service/**,it/pagopa/selfcare/onboarding/repository/**
quarkus.jacoco.data-file=target/jacoco.exec

# HTTP Server Configuration - Timeout e Keep-Alive
quarkus.http.idle-timeout=${HTTP_IDLE_TIMEOUT:60s}
quarkus.http.read-timeout=${HTTP_READ_TIMEOUT:60s}
quarkus.http.so-reuse-port=${HTTP_SO_REUSE_PORT:true}
quarkus.http.tcp-quick-ack=${TCP_QUICK_ACK:true}
quarkus.http.tcp-cork=${HTTP_TCP_CORK:true}

# Vertx HTTP Options
quarkus.vertx.prefer-native-transport=${VERTX_PREFER_NATIVE_TRANSPORT:true}
