  mongodb:
    image: mongo:latest@sha256:3a7947f3211e70c045ebff7e94293298bc3fa4e08e5cfcb8cb32ca0d06e06635
    ports:
      - "27017:27017"
    volumes:
      - "./src/test/resources/db:/docker-entrypoint-initdb.d"
    networks:
      - webhook-network

  mockserver:
    image: mockserver/mockserver@sha256:adec675a93253dcd503cda331dbc8c88383c1c79ceb2370ec9766ad3f010d255
    ports:
      - '1080:1080'
    environment:
      - MOCKSERVER_INITIALIZATION_JSON_PATH=/config/*.json
      - MOCKSERVER_ENABLE_CORS_FOR_API="true"
      - MOCKSERVER_ENABLE_CORS_FOR_ALL_RESPONSES="true"
    volumes:
      - "./src/test/resources/mock:/config"
    networks:
      - webhook-network

  sql-edge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ServiceBusEmulator1!"
    networks:
      - webhook-network

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    ports:
      - "5672:5672"
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: sql-edge
      MSSQL_SA_PASSWORD: "ServiceBusEmulator1!"
      CONFIG_PATH: /ServiceBus_Emulator/ConfigFiles/Config.json
    volumes:
      - "./src/test/resources/servicebus/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    depends_on:
      - sql-edge
    networks:
      - webhook-network

networks:
  webhook-network:
    driver: bridge
